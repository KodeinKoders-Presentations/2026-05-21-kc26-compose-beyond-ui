product:
  type: lib
  platforms: [ jvm, wasmJs ]

repositories:
  - url: https://maven.pkg.github.com/kodeinkoders/kodein-themes
    credentials:
      file: ../local.properties
      usernameKey: gpr.user
      passwordKey: gpr.key
  - url: mavenLocal
dependencies:
  - $compose.foundation: exported
  - $compose.material3: exported
  - $compose.components.resources
  - $libs.cup
  - $libs.cup.plugin.imageExport
  - $libs.cup.plugin.keyEvents
  - $libs.cup.plugin.laser
  - $libs.cup.plugin.speakerWindow
  - $libs.cup.widgets.material3
  - $libs.cup.widgets.sourceCode
  - $libs.emoji.compose
  - $libs.kodein.theme
  - $libs.qrose

settings:
  kotlin:
    version: 2.3.20
  compose:
    enabled: true
    version: 1.10.3
  jvm:
    jdk:
      version: 21